logger = logging.getLogger("DistillationEngine")

# ---------------------------------------------------------
# 2. Safety & Sensors (제어 밸브)
# ---------------------------------------------------------
class RMDSensor:
    """상대적 마할라노비스 거리(RMD) 계산기 — Sherman-Morrison 온라인 업데이트"""
    def __init__(self, feature_dim: int, min_samples: int = 50, reg_lambda: float = 1e-4):
        self.feature_dim = feature_dim
        self.min_samples = min_samples
        self.reg_lambda = reg_lambda
        self.mu = torch.zeros(feature_dim)
        self.cov_inv = torch.eye(feature_dim)
        self.n = 0
        self._cov_acc = torch.zeros(feature_dim, feature_dim)  # cold-start 외적 누적

    def compute(self, x: torch.Tensor) -> float:
        x_norm = F.normalize(x, p=2, dim=0)
        delta = x_norm - self.mu
        rmd = torch.sqrt(torch.dot(delta, self.cov_inv @ delta)).item()
        return rmd

    def update(self, x: torch.Tensor) -> None:
        """
        Welford 평균 업데이트 후 Sherman-Morrison 랭크-1 공분산 역행렬 갱신.
        cold-start 기간(n < min_samples)에는 외적을 누적하다 min_samples 도달 시
        정규화된 공분산을 한 번 역행렬 계산하고 이후 O(d²) 업데이트로 전환.
        """
        x_norm = F.normalize(x, p=2, dim=0)
        mu_old = self.mu.clone()
        self.n += 1
        self.mu = mu_old + (x_norm - mu_old) / self.n  # Welford

        u = x_norm - mu_old   # pre-update delta
        v = x_norm - self.mu  # post-update delta

        if self.n < self.min_samples:
            self._cov_acc += torch.outer(u, v)
            return

        if self.n == self.min_samples:
            C = self._cov_acc / max(self.n - 1, 1)
            C_reg = C + self.reg_lambda * torch.eye(self.feature_dim)
            self.cov_inv = torch.linalg.inv(C_reg)
            return

        # Sherman-Morrison: C_new = C_old + u*v^T  =>  역행렬 O(d²) 업데이트
        Cinv_u = self.cov_inv @ u
        v_Cinv = self.cov_inv @ v   # cov_inv 대칭이므로 C_inv^T = C_inv
        denom = 1.0 + torch.dot(v, Cinv_u)
        if denom.abs().item() < 1e-9:
            return  # 근-특이 업데이트 스킵
        self.cov_inv = self.cov_inv - torch.outer(Cinv_u, v_Cinv) / denom

        # 500스텝마다 재정규화 — 부동소수점 드리프트 억제
        if self.n % 500 == 0:
            self.cov_inv = self.cov_inv + self.reg_lambda * torch.eye(self.feature_dim)


# ---------------------------------------------------------
# TDA 헬퍼 — 모듈 레벨 자유 함수 (ProcessPoolExecutor pickle 필요)
# ---------------------------------------------------------
def _compute_rips_wasserstein(
    z_np: np.ndarray,
    prev_diagram_np: Optional[np.ndarray],
    max_edge_length: float,
    homology_dims: List[int],
) -> Tuple[float, np.ndarray]:
    """
    giotto-tda로 Vietoris-Rips 퍼시스턴스 계산 후 이전 다이어그램과의
    Wasserstein 거리를 반환. 클래스 밖에 정의해야 pickle 가능.
    """
    from gtda.homology import VietorisRipsPersistence
    from gtda.diagrams import Wasserstein as WD

    vrp = VietorisRipsPersistence(
        homology_dimensions=homology_dims,
        max_edge_length=max_edge_length,
        n_jobs=1,
    )
    z_3d = z_np[np.newaxis, :, :]       # (1, n_points, n_dims)
    new_diag = vrp.fit_transform(z_3d)  # (1, n_pairs, 3)

    if prev_diagram_np is None:
        return 0.0, new_diag

    both = np.concatenate([prev_diagram_np, new_diag], axis=0)  # (2, n_pairs, 3)
    wd = WD(order=1, enable_autodiff=False)
    wd.fit(both)
    dist_matrix = wd.transform(both)    # (2, 2)
    return float(dist_matrix[0, 1]), new_diag


class TDA_Monitor:
    """배치 단위 비동기 위상 붕괴 감지기 — giotto-tda Rips 퍼시스턴스 기반"""
    def __init__(self, window_size: int = 10, max_edge_length: float = 2.0,
                 homology_dims: Optional[List[int]] = None, n_workers: int = 2):
        self.wasserstein_history = deque(maxlen=window_size)
        self.mu = 0.0
        self.sigma = 1e-5
        self.max_edge_length = max_edge_length
        self.homology_dims = homology_dims or [0, 1]  # H0, H1만 사용 (속도)
        self.prev_diagram: Optional[np.ndarray] = None
        self._executor = concurrent.futures.ProcessPoolExecutor(max_workers=n_workers)
        self._pending_future: Optional[concurrent.futures.Future] = None

    def check_topological_spike(self, z_batch: torch.Tensor) -> Tuple[bool, float]:
        """
        1-tick 래그 비동기 패턴:
          - 이전 future 결과를 수집하고 z-score 계산
          - 새 배치로 신규 future 제출 (비블로킹)
        메인 루프는 절대 블로킹되지 않음.
        """
        z_np = z_batch.detach().cpu().numpy()

        # 이전 future 결과 수집
        current_w_dist = 0.0
        if self._pending_future is not None and self._pending_future.done():
            try:
                w_dist_result, new_diag = self._pending_future.result()
                self.prev_diagram = new_diag
                current_w_dist = w_dist_result
            except Exception as e:
                logger.error(f"TDA 연산 실패: {e}")
            self._pending_future = None

        # 새 연산 제출 (이전 작업이 완료됐거나 없을 때만)
        if self._pending_future is None:
            self._pending_future = self._executor.submit(
                _compute_rips_wasserstein,
                z_np,
                self.prev_diagram,
                self.max_edge_length,
                self.homology_dims,
            )

        spike_level = (current_w_dist - self.mu) / (self.sigma + 1e-8)
        is_collapse = spike_level > 3.0

        self.wasserstein_history.append(current_w_dist)
        self.mu = float(np.mean(self.wasserstein_history))
        self.sigma = float(np.std(self.wasserstein_history))

        return is_collapse, spike_level


class ControlBarrierFunction:
    """V^pi 기반 단계적 안전 구역 제어기"""
    def evaluate_zone(self, v_pi: float, theta_risk: float) -> Tuple[str, float]:
        distance_to_cliff = v_pi - theta_risk

        if distance_to_cliff < 0:
            return "TERMINAL", 0.0
        elif distance_to_cliff < 5.0:
            return "RED", 0.1
        elif distance_to_cliff < 15.0:
            return "YELLOW", 0.5
        else:
            return "GREEN", 1.0


# ---------------------------------------------------------
# 3. Policy-Value Network
# ---------------------------------------------------------
class PolicyValueNet(nn.Module):
    """
    공유 트렁크 → 정책 헤드(logits) + 가치 헤드(V^π).
    confidence = 1 - H(π) / log(|A|)  (entropy 기반, [0,1] 정규화)
    """
    def __init__(self, state_dim: int = 128, action_dim: int = 5,
                 hidden1: int = 64, hidden2: int = 32):
        super().__init__()
        self.action_dim = action_dim
        self.trunk = nn.Sequential(
            nn.Linear(state_dim, hidden1),
            nn.LayerNorm(hidden1),
            nn.ReLU(),
            nn.Linear(hidden1, hidden2),
            nn.LayerNorm(hidden2),
            nn.ReLU(),
        )
        self.policy_head = nn.Linear(hidden2, action_dim)
        self.value_head  = nn.Linear(hidden2, 1)

    def forward(self, state: torch.Tensor) -> Tuple[torch.Tensor, float, float]:
        features = self.trunk(state)                              # (hidden2,)
        logits   = self.policy_head(features)                    # (action_dim,)

        probs      = F.softmax(logits, dim=-1)
        H          = -torch.sum(probs * torch.log(probs + 1e-9))
        H_max      = torch.log(torch.tensor(float(self.action_dim)))
        confidence = (1.0 - H / H_max).item()                   # float [0, 1]

        v_pi = self.value_head(features).squeeze(-1).item()      # float, unbounded

        return logits, confidence, v_pi


# ---------------------------------------------------------
# 4. Agents (편향된 실험체)
# ---------------------------------------------------------
class BiasedAgent:
    def __init__(self, agent_id: str, bias_type: str,
                 state_dim: int = 128, action_dim: int = 5):
        self.id        = agent_id
        self.bias_type = bias_type
        self.net       = PolicyValueNet(state_dim, action_dim)

    def forward(self, state: torch.Tensor) -> Tuple[torch.Tensor, float, float]:
        """행동 로짓, 확신도(Confidence), 가치(V^pi) 반환 — 시그니처 불변"""
        return self.net(state)


# ---------------------------------------------------------
# 5. 보상 함수 및 훈련 스켈레톤 (V^π 분기 메커니즘)
# ---------------------------------------------------------
def reward_fn(
    state: torch.Tensor,
    action: int,
    next_state: torch.Tensor,
    bias_type: str,
) -> float:
    """
    bias_type별 보상 신호.
    HighVol(킬 중심): 공격적 상태 전이 보상, 역전이 2배 패널티
    LowVol(오브젝트 중심): 안정적 소폭 증가 보상, 변동성 패널티
    훈련 후 두 에이전트의 V^π 분포가 의미 있게 달라짐.
    """
    delta = (next_state.norm() - state.norm()).item()
    if bias_type == "HighVol":
        return max(0.0, delta) - max(0.0, -delta) * 2.0
    elif bias_type == "LowVol":
        return delta * 0.5 - abs(delta - 0.1)
    else:
        raise ValueError(f"Unknown bias_type: {bias_type}")


def train_agent_skeleton(
    agent: BiasedAgent,
    n_steps: int = 1000,
    lr: float = 1e-3,
    gamma: float = 0.99,
    state_dim: int = 128,
) -> None:
    """
    A2C 스타일 훈련 스켈레톤 — 실제 환경 env.step() 없이 합성 전이 사용.
    bias_type에 따라 V^π 분포가 분기되는 구조를 시연.
    실 배포 시 state/next_state를 환경에서 받아오는 부분만 교체.
    """
    optimizer = torch.optim.Adam(agent.net.parameters(), lr=lr)

    for step in range(n_steps):
        state     = torch.randn(state_dim)
        logits, conf, v_pi = agent.forward(state)

        probs    = F.softmax(logits, dim=-1)
        dist_cat = torch.distributions.Categorical(probs)
        action   = dist_cat.sample()
        log_prob = dist_cat.log_prob(action)

        next_state = state + 0.1 * torch.randn(state_dim)  # 합성 전이
        r = reward_fn(state, action.item(), next_state, agent.bias_type)

        with torch.no_grad():
            _, _, v_next = agent.forward(next_state)
        td_target = r + gamma * v_next

        # 가치 손실
        features    = agent.net.trunk(state)
        v_pi_tensor = agent.net.value_head(features).squeeze(-1)
        value_loss  = F.mse_loss(v_pi_tensor, torch.tensor(td_target))

        # 정책 손실 (A2C 어드밴티지)
        advantage   = td_target - v_pi
        policy_loss = -log_prob * advantage

        # 엔트로피 정규화
        entropy     = -torch.sum(probs * torch.log(probs + 1e-9))
        loss        = policy_loss + 0.5 * value_loss - 0.01 * entropy

        optimizer.zero_grad()
        loss.backward()
        torch.nn.utils.clip_grad_norm_(agent.net.parameters(), max_norm=1.0)
        optimizer.step()

        if step % 200 == 0:
            logger.info(
                f"[{agent.id}] step={step} | v_pi={v_pi:.3f} | "
                f"reward={r:.3f} | loss={loss.item():.4f}"
            )


# ---------------------------------------------------------
# 6. Main Arena (비동기 라우팅 엔진)
# ---------------------------------------------------------
class Arena:
    def __init__(self, agents: List[BiasedAgent],
                 alpha: float = 2.0):
        self.agents     = agents
        self.rmd_sensor = RMDSensor(feature_dim=128)
        self.tda_monitor = TDA_Monitor()
        self.cbf        = ControlBarrierFunction()

        self.theta_risk  = -5.0
        self.alpha       = alpha   # 레짐 가중치 (0=off, 0.5=balanced, 2=hard)
        self.regime_prob = 0.5     # P(high vol), 외부에서 주입 (HMM 등)
        self._halt_event = threading.Event()  # thread-safe kill switch

    @property
    def halt_system(self) -> bool:
        return self._halt_event.is_set()

    @halt_system.setter
    def halt_system(self, value: bool) -> None:
        if value:
            self._halt_event.set()
        else:
            self._halt_event.clear()

    def tick_auction(self, state_features: torch.Tensor, corr_id: str):
        if self.halt_system:
            logger.error(f"[{corr_id}] SYSTEM HALTED: Topological Collapse Detected.")
            return

        # 1. RMD 센싱 → 동적 온도 스케일링 → 공분산 업데이트
        rmd_score   = self.rmd_sensor.compute(state_features)
        temperature = 1.0 + (0.5 * rmd_score)
        self.rmd_sensor.update(state_features)
        logger.info(f"[{corr_id}] RMD: {rmd_score:.4f} | Dynamic Temp: {temperature:.4f}")

        bids = []
        # 2. 에이전트 입찰 및 CBF 검증
        for agent in self.agents:
            logits, conf, v_pi = agent.forward(state_features)

            zone, damping_factor = self.cbf.evaluate_zone(v_pi, self.theta_risk)

            if zone == "TERMINAL":
                logger.warning(f"[{corr_id}] Agent {agent.id} reached absorbing state. Ejected.")
                continue

            # 레짐 가중치: alpha=0이면 기존 동작과 동일
            if agent.bias_type == "HighVol":
                regime_factor = 1.0 + self.alpha * self.regime_prob
            else:
                regime_factor = 1.0 + self.alpha * (1.0 - self.regime_prob)

            scaled_conf = (conf / temperature) * damping_factor * regime_factor
            bids.append((scaled_conf, agent, logits, zone))

        if not bids:
            logger.critical(f"[{corr_id}] All agents in TERMINAL state. Global Absorbing State Triggered.")
            self.halt_system = True
            return

        # 3. VCG 경매 낙찰
        bids.sort(key=lambda x: x[0], reverse=True)
        winning_conf, winning_agent, selected_action, zone = bids[0]

        logger.info(f"[{corr_id}] Winner: {winning_agent.id} | Conf: {winning_conf:.4f} | Zone: {zone}")
        # TODO: 환경에 selected_action 적용 및 상태 전이

    def run_batch_monitor(self, latent_batch: torch.Tensor):
        """비동기 TDA 모니터링 — 메인 루프를 블로킹하지 않음"""
        corr_id = str(uuid.uuid4())[:8]
        is_collapse, spike = self.tda_monitor.check_topological_spike(latent_batch)

        if is_collapse:
            logger.critical(f"[{corr_id}] TOPOLOGICAL SPIKE DETECTED (Z={spike:.2f}). Triggering Kill Switch.")
            self.halt_system = True
        else:
            logger.info(f"[{corr_id}] Topology Stable (Z={spike:.2f}).")


# ---------------------------------------------------------
# 실행 시뮬레이션
# ---------------------------------------------------------
if __name__ == "__main__":
    agents = [
        BiasedAgent(agent_id="Faker_Aggro_01", bias_type="HighVol"),
        BiasedAgent(agent_id="Chovy_Safe_02",  bias_type="LowVol"),
    ]

    arena = Arena(agents)

    for tick in range(5):
        correlation_id = str(uuid.uuid4())[:8]
        dummy_state    = torch.randn(128)
        arena.tick_auction(dummy_state, correlation_id)

    dummy_latent_batch = torch.randn(64, 32)
    arena.run_batch_monitor(dummy_latent_batch)
